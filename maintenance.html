  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      backdrop-filter: blur(16px);
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;
      height: 64px; display: flex; align-items: center;
    }
    .logo {
      display: flex; align-items: center; gap: 0.6rem;
      text-decoration: none;
    }
    .logo img { height: 28px; width: 28px; }
    .logo span {
      font-size: 1.25rem; font-weight: 700; color: #f1f5f9;
      letter-spacing: -0.01em;
    }
    .hero {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 7rem 1.5rem 4rem; text-align: center;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-inner { position: relative; max-width: 600px; }
    .tag {
      display: block; width: fit-content; margin: 0 auto 1.5rem;
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #3b82f6; background: rgba(59,130,246,0.12);
      padding: 0.35rem 1rem; border-radius: 100px;
    }
    h1 {
      font-size: 2.4rem; font-weight: 800; line-height: 1.2;
      letter-spacing: -0.02em; margin-bottom: 1rem;
    }
    .accent { color: #3b82f6; }
    p {
      font-size: 1.05rem; line-height: 1.7; color: #94a3b8;
      max-width: 500px; margin: 0 auto 2rem;
    }
    .spinner-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 0.75rem; color: #64748b; font-size: 0.88rem;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(59,130,246,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-bar {
      width: 100%; max-width: 320px; height: 4px; background: rgba(255,255,255,0.06);
      border-radius: 4px; overflow: hidden; margin: 1.5rem auto 0;
    }
    .progress-fill {
      height: 100%; width: 40%; background: #3b82f6; border-radius: 4px;
      animation: progress 1.8s ease-in-out infinite;
    }
    @keyframes progress {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    footer {
      padding: 1.5rem; text-align: center;
      font-size: 0.78rem; color: #475569;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      p { font-size: 0.92rem; }
    }
  </style>
