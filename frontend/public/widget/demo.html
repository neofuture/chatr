<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatr Widget Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { font-size: 2rem; font-weight: 700; }
    p { color: #94a3b8; max-width: 480px; text-align: center; line-height: 1.6; }
    .snippet {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px 20px;
      font-family: monospace;
      font-size: 13px;
      color: #f97316;
      max-width: 520px;
      width: 100%;
      white-space: pre;
    }
    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 4px;
    }
    .mode-badge {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      z-index: 9999;
      pointer-events: none;
    }
    .mode-badge.dev  { background: #f97316; color: #fff; }
    .mode-badge.prod { background: #22c55e; color: #fff; }
  </style>
</head>
<body>
  <div id="mode-badge" class="mode-badge"></div>
  <script>
    var badge = document.getElementById('mode-badge');
    var isLocalHost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if (isLocalHost) {
      badge.textContent = '⚡ Dev Mode — fresh chat every load';
      badge.classList.add('dev');
    } else {
      badge.textContent = '✓ Production — session persists';
      badge.classList.add('prod');
    }
  </script>
  <h1>💬 Chatr Widget Demo</h1>
  <p>Click the chat button in the bottom-right corner to start a support conversation.</p>

  <div>
    <div class="label">Embed on any site</div>
    <div class="snippet">&lt;script src="https://api.chatr-app.online/widget/chatr.js"&gt;&lt;/script&gt;</div>
  </div>

  <script>
    // The widget script is proxied through Next.js (/widget/chatr.js → localhost:3001)
    // so auto-detection sees localhost:3000. We set apiUrl explicitly for the demo.
    var isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    window.ChatrWidgetConfig = {
      apiUrl: isLocal ? 'http://localhost:3001' : 'https://api.chatr-app.online',
      accentColor: '#f97316',
      title: 'Chatr Support',
      greeting: "Hi there 👋 Need help? We're here!",
      // devMode is auto-detected: true on localhost (fresh chat every load),
      // false in production (session persists in localStorage).
    };
  </script>

  <!--
    chatr.js is proxied from the backend via Next.js rewrite:
      /widget/chatr.js  →  http://localhost:3001/widget/chatr.js  (dev)
      /widget/chatr.js  →  https://api.chatr-app.online/widget/chatr.js  (prod)
  -->
  <script src="/widget/chatr.js"></script>
</body>
</html>
