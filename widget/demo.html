<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatr Widget Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { font-size: 2rem; font-weight: 700; }
    p { color: #64748b; max-width: 480px; text-align: center; line-height: 1.6; }
    code {
      background: #1e293b; color: #f97316; padding: 12px 20px;
      border-radius: 8px; display: block; font-size: 14px;
      max-width: 500px; width: 100%;
    }
  </style>
</head>
<body>
  <h1>Chatr Widget Demo</h1>
  <p>This page demonstrates the Chatr support chat widget. Click the chat button in the bottom-right corner to start a conversation.</p>
  <code>&lt;script src="https://api.chatr-app.online/widget/chatr.js"&gt;&lt;/script&gt;</code>

  <!-- Widget config (optional) -->
  <script>
    window.ChatrWidgetConfig = {
      apiUrl: window.location.hostname === 'localhost' ? 'http://localhost:3001' : 'https://api.chatr-app.online',
      accentColor: '#f97316',
      title: 'Chatr Support',
      greeting: 'Hi there 👋 Need help? We\'re here!',
    };
  </script>

  <!-- The widget itself -->
  <script src="/widget/chatr.js"></script>
</body>
</html>
